<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Мой сайт{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
    <style>
        body { background-color: #f8f9fa; }
        .navbar { margin-bottom: 2rem; }
    </style>
</head>
<body>

    <!-- Навигационная панель (опционально) -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="/">zxc project</a>
      </div>
    </nav>

    <!-- Основной контент -->
    <main class="container">
        {% block content %}
        <!-- Сюда Django вставит код из других файлов -->
        {% endblock %}
    </main>

    <!-- Подвал (опционально) -->
    <footer class="footer mt-auto py-3 bg-white border-top fixed-bottom">
      <div class="container text-center">
        <span class="text-muted">&copy; 2024 Ваше Приложение</span>
      </div>
    </footer>
    <script src="https://cdn.jsdelivr.net"></script>
</body>
</html>
